installed:
- agent-context
- solid
settings:
  auto_execute_hooks: true
hooks:
  after_specify:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after specification
    condition: null
  after_plan:
  - extension: agent-context
    command: speckit.agent-context.update
    enabled: true
    optional: true
    priority: 10
    prompt: Execute speckit.agent-context.update?
    description: Refresh agent context after planning
    condition: null
  before_implement:
  - extension: solid
    command: speckit.solid.apply
    enabled: true
    optional: false
    prompt: Execute speckit.solid.apply?
    description: 'Mandatory: apply SOLID/TDD/clean-code discipline before any implementation
      task runs'
    condition: null
