name: Frontend
on: [push, pull_request]
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 10.12.4, run_install: false }
      - uses: actions/setup-node@v4
        with:
          {
            node-version: 20,
            cache: pnpm,
            cache-dependency-path: frontend/pnpm-lock.yaml,
          }
      - run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install chromium --with-deps
      - name: Run E2E tests
        working-directory: frontend
        run: pnpm test:e2e
      - run: pnpm run lint
      - name: Check formatting
        working-directory: frontend
        run: pnpm format:check
      - run: pnpm exec ng build dashboard
      - run: pnpm exec ng build widget
      - run: pnpm exec ng test dashboard --watch=false --browsers=ChromeHeadless
      - run: pnpm exec ng test widget --watch=false --browsers=ChromeHeadless
      - name: Secret pattern scan
        working-directory: .
        continue-on-error: true
        run: git grep -nE 'AKIA[0-9A-Z]{16}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY' -- ':!specs' || true
  real-backend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: customer_service_e2e
          POSTGRES_USER: customer_service
          POSTGRES_PASSWORD: customer_service_e2e
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U customer_service -d customer_service_e2e"
          --health-interval 5s --health-timeout 5s --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s
          --health-timeout 3s --health-retries 10
    env:
      DATABASE_URL: postgres://customer_service:customer_service_e2e@127.0.0.1:5432/customer_service_e2e
      REDIS_URL: redis://127.0.0.1:6379
      APP_ENVIRONMENT: development
      AUTH_JWT_SECRET: t150-ci-auth-jwt-secret-at-least-32-bytes
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:4201
      PUBLIC_DASHBOARD_URL: http://127.0.0.1:4201
      E2E_BACKEND_PORT: 18080
      BIND_ADDRESS: 127.0.0.1
      CI_REAL_BACKEND: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: pnpm/action-setup@v4
        with: { version: 10.34.4, run_install: false }
      - uses: actions/setup-node@v4
        with:
          {
            node-version: 20,
            cache: pnpm,
            cache-dependency-path: frontend/pnpm-lock.yaml,
          }
      - name: Apply and verify database migrations
        working-directory: backend
        env:
          REQUIRE_DB_TESTS: 1
        run: cargo test -p db --test schema run_migrations_succeeds -- --exact
      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browser
        working-directory: frontend
        run: pnpm exec playwright install chromium --with-deps
      - name: Validate mandatory real-stack wiring
        working-directory: frontend
        run: node --test e2e/real-backend-workflow.validation.test.mjs
      - name: Run real-backend tenant team workflow
        working-directory: frontend
        run: pnpm test:e2e:real
