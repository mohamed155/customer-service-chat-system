services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-customer_service}
      POSTGRES_USER: ${POSTGRES_USER:-customer_service}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-customer_service_dev}
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis:7
    ports: ["6379:6379"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
  minio:
    image: minio/minio
    command: server /data --console-address :9001
    # Note: the MinIO bucket named by APP_S3_BUCKET must be created manually
    # (e.g. via mc, the MinIO console at port 9001, or an init script).
    # The application does not auto-create buckets.
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports: ["9000:9000", "9001:9001"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10
  mailhog:
    image: mailhog/mailhog
    ports: ["1025:1025", "8025:8025"]

